name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # THIS STEP INJECTS YOUR KEY
      - name: Inject API Key
        run: |
          find . name "*.html" -exec sed -i 's/REPLACE_ME_WITH_REAL_KEY/${{ secrets.API_KEY }}/g' {} +
          # Repeat the line above for any other files that need the key

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads your whole repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
